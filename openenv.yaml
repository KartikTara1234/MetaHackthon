name: code-review-env
version: "1.0.0"
description: >
  A real-world code review environment where an AI agent examines Python
  code snippets and identifies syntax errors, logical bugs, and security
  vulnerabilities. Simulates the task of a junior developer or automated
  code reviewer.

author: openenv-hackathon-submission
app_file: app.py
tags:
  - openenv
  - code-review
  - real-world
  - python

tasks:
  - name: easy
    description: "Find syntax errors in Python code snippets"
    difficulty: easy
    max_steps: 5
    reward_range: [0.0, 1.0]

  - name: medium
    description: "Find logical bugs that cause incorrect program behavior"
    difficulty: medium
    max_steps: 5
    reward_range: [0.0, 1.0]

  - name: hard
    description: "Find security vulnerabilities in Python code"
    difficulty: hard
    max_steps: 5
    reward_range: [0.0, 1.0]

observation_space:
  type: object
  fields:
    code_snippet:
      type: string
      description: The Python code snippet to review
    task_description:
      type: string
      description: What the agent is asked to find
    issues_found:
      type: array
      items: string
      description: Issues the agent has reported so far
    step_count:
      type: integer
      description: Current step number
    max_steps:
      type: integer
      description: Maximum steps allowed in the episode

action_space:
  type: object
  fields:
    identified_issues:
      type: array
      items: string
      description: List of issue descriptions the agent has identified
    submit:
      type: boolean
      description: Set to true to finalize the agent's answer

reward:
  type: float
  range: [-0.2, 1.0]
  description: >
    1.0 for correctly identifying the main issue,
    0.1-0.9 for partial matches on key concepts,
    -0.1 for empty submissions,
    -0.2 for submitting with no content.

docker:
  image: python:3.11-slim
  port: 7860

endpoints:
  - method: POST
    path: /reset
    description: Reset environment, returns initial Observation
  - method: POST
    path: /step
    description: Take action, returns observation, reward, done, info
  - method: GET
    path: /state
    description: Returns current environment state dict
